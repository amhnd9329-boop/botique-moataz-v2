<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوتيك معتز V2</title>
<style>
body{font-family:'Segoe UI';background:linear-gradient(135deg,#f8e8f0 0%,#fff5f9 100%);margin:0;padding-bottom:80px}
header{background:linear-gradient(90deg,#d81b60,#ec407a);color:white;text-align:center;padding:25px 15px}
.container{max-width:600px;margin:20px auto;padding:0 15px;display:grid;gap:20px}
.card{background:white;border-radius:20px;box-shadow:0 6px 20px rgba(0,0,0,0.08);overflow:hidden}
.card img{width:100%;height:250px;object-fit:cover}
.card-body{padding:15px}
.card h3{color:#d81b60;margin-bottom:8px}
.btn-whatsapp{display:block;background:#25D366;color:white;text-align:center;padding:12px;border-radius:12px;text-decoration:none;font-weight:bold}
.footer-btn{position:fixed;bottom:0;left:0;right:0;background:#25D366;color:white;text-align:center;padding:15px;font-weight:bold;text-decoration:none}
</style>
</head>
<body>
<header><h1>✨ بوتيك معتز V2 ✨</h1><p>ارقى المنتجات النسائية</p></header>
<div class="container">
  <div class="card">
    <img src="https://i.imgur.com/1.jpg" alt="منتج">
    <div class="card-body">
      <h3>ساعة نسائية فخمة</h3>
      <p>تصميم عصري. للسعر اضغطي واتساب</p>
      <a class="btn-whatsapp" href="https://wa.me/249XXXXXXXXX" target="_blank">اطلبي هسي واتساب 📱</a>
    </div>
  </div>
</div>
<a href="https://wa.me/249XXXXXXXXX" class="footer-btn" target="_blank">🛍️ اطلب هسي واتساب</a>
</body>
</html>
